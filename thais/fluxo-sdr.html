<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo SDR — Thais × Portal Contábeis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #09090f;
      --surface:     #111119;
      --surface-2:   #181827;
      --border:      #1e1e2e;
      --border-2:    #2a2a42;
      --text-1:      #dde1f5;
      --text-2:      #6a6f94;
      --text-3:      #3e4260;
      --purple:      #8478f5;
      --teal:        #2dcfba;
      --blue:        #4da6f5;
      --amber:       #f5a92b;
      --green:       #3fd96d;
      --coral:       #f56a48;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 36px; height: 60px;
      display: flex; align-items: center; gap: 18px;
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-1); letter-spacing: -0.01em;
    }
    .logo-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--purple); box-shadow: 0 0 8px var(--purple);
    }
    .sep { width: 1px; height: 18px; background: var(--border-2); }
    .campaign-label { font-size: 12.5px; color: var(--text-2); }
    .campaign-label strong { color: var(--text-1); font-weight: 500; }
    .version-badge {
      margin-left: auto; font-size: 10.5px; padding: 3px 9px;
      border-radius: 4px; border: 1px solid var(--border-2);
      color: var(--text-3); background: var(--surface-2);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .wrap { display: flex; max-width: 1200px; margin: 0 auto; }
    .panel-left {
      width: 370px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 28px 18px;
      position: sticky; top: 60px;
      height: calc(100vh - 60px); overflow-y: auto;
    }
    .panel-left::-webkit-scrollbar { width: 4px; }
    .panel-left::-webkit-scrollbar-track { background: transparent; }
    .panel-left::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
    .flow-label {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 18px;
    }
    .panel-right { flex: 1; padding: 32px 40px; min-width: 0; max-width: 720px; }
    .step-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 26px; }
    .stab {
      padding: 5px 12px; border-radius: 99px; font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border-2); background: transparent;
      color: var(--text-2); cursor: pointer; transition: all .15s;
    }
    .stab:hover { background: var(--surface-2); color: var(--text-1); }
    .stab.on { border-color: var(--purple); background: #1c1848; color: var(--text-1); }
    .conv-header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: #1c1848; border: 1px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; color: var(--purple); flex-shrink: 0;
    }
    .conv-name { font-size: 14px; font-weight: 500; }
    .conv-sub  { font-size: 11.5px; color: var(--text-2); margin-top: 1px; }
    .conv-badge {
      margin-left: auto; font-size: 11px; padding: 3px 10px;
      border-radius: 4px; border: 1px solid; white-space: nowrap;
    }
    .sys-note {
      text-align: center; font-size: 12px; color: var(--text-3);
      padding: 0 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .msg-row { margin-bottom: 12px; }
    .msg-who { font-size: 11px; font-weight: 500; color: var(--text-3); margin-bottom: 4px; letter-spacing: .02em; }
    .msg-who.r { text-align: right; }
    .bubble {
      display: inline-block; max-width: 86%;
      padding: 10px 14px; font-size: 13.5px; line-height: 1.72;
      border-radius: 4px 14px 14px 14px;
      background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-1);
    }
    .bubble.lead {
      border-radius: 14px 4px 14px 14px;
      background: var(--surface); color: var(--text-2);
      font-style: italic; float: right;
    }
    .clearfix { clear: both; }
    .opts { display: flex; flex-direction: column; gap: 6px; margin: 6px 0 10px; }
    .opt {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--border-2);
      font-size: 13px; color: var(--text-2);
      background: var(--surface); width: fit-content;
    }
    .opt.ok  { border-color: rgba(45,207,186,.3); color: #9ee8de; }
    .opt.out { border-color: rgba(245,106,72,.3); color: #f56a48; }
    .tip {
      margin-top: 16px; padding: 11px 15px;
      background: rgba(132,120,245,.07);
      border: 1px solid rgba(132,120,245,.2);
      border-radius: 8px; font-size: 12.5px; line-height: 1.65; color: #a89ef0;
    }
    .tip strong { color: #c4bcf8; }
    @media (max-width: 840px) {
      .wrap { flex-direction: column; }
      .panel-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); position: relative; top: 0; height: auto; }
      .panel-right { padding: 24px 20px; }
      .topbar { padding: 0 20px; }
      .version-badge { display: none; }
    }
  </style>
</head>
<body>

<header class="topbar">

  <div class="sep"></div>

        <rect x="46" y="262" width="194" height="50" rx="8" fill="#0b2e2a" stroke="#2dcfba" stroke-width="1"/>

        <text x="143" y="343" text-anchor="middle" dominant-baseline="central" fill="#9ee8de" font-family="DM Sans,sans-serif" font-size="12.5" font-weight="500">Qual. 3 — Demanda</text>

      <!-- s6 Coleta -->

<script>
const steps = [
  {
    sub:'Etapa de entrada', badge:'Trigger', bc:'#3e4260', bb:'#181827', bbd:'#2a2a42',
    msgs:[{t:'sys',s:'Lead clica no anúncio da campanha e abre o WhatsApp'}],
    tip:'Adicione <strong>?src=portalcontabeis</strong> na URL do anúncio para rastrear automaticamente a origem no CRM.'
  },
  {
    sub:'Passo 1 de 8', badge:'Abertura', bc:'#a99cf5', bb:'#1c1848', bbd:'#8478f5',
    msgs:[{t:'thais',s:'Olá! 👋 Aqui é a *Thais*, assistente da [Empresa].\n\nVi que você veio por um conteúdo em parceria com o *Portal Contábeis* — boa pedida! 😊\n\nTenho uma proposta interessante pro seu escritório. Me permite fazer umas perguntas rápidas?'}],

  },
  {
    sub:'Passo 2 de 8 — Perfil', badge:'Perfil', bc:'#4da6f5', bb:'#08192e', bbd:'#4da6f5',
    msgs:[
      {t:'thais',s:'Que ótimo! Antes de continuar, me conta rapidinho:\n\n*Como você se identifica no mercado?*'},
      {t:'opts', opts:[
        {icon:'🏢', label:'Escritório de contabilidade', cls:'ok'},
        {icon:'👤', label:'Contador autônomo / MEI', cls:'ok'},
        {icon:'🔧', label:'Outro tipo de serviço', cls:'out'}

const nodePos = [
  {x:46,y:20, w:194,h:36,rx:18},
  {x:46,y:70, w:194,h:50,rx:8},
  {x:46,y:134,w:194,h:50,rx:8},
  {x:46,y:198,w:194,h:50,rx:8},
  {x:46,y:262,w:194,h:50,rx:8},
  {x:46,y:326,w:194,h:50,rx:8},
  {x:46,y:390,w:194,h:50,rx:8},
  {x:46,y:454,w:194,h:50,rx:8},
  {x:46,y:518,w:194,h:50,rx:8}
];

function sel(n) {
  const p = nodePos[n];
  const r = document.getElementById('sel-ring');
  r.setAttribute('x',      p.x-3);
  r.setAttribute('y',      p.y-3);
  r.setAttribute('width',  p.w+6);
  r.setAttribute('height', p.h+6);
  r.setAttribute('rx',     p.rx+3);
  r.setAttribute('opacity','1');
  document.querySelectorAll('.stab').forEach((b,i) => b.classList.toggle('on', i===n));
  const d = steps[n];
  document.getElementById('c-sub').textContent = 'SDR IA — ' + d.sub;
  const badge = document.getElementById('c-badge');
  badge.textContent       = d.badge;
  badge.style.color       = d.bc;
  badge.style.background  = d.bb;
  badge.style.borderColor = d.bbd;
  const chat = document.getElementById('chat');
  chat.innerHTML = render(d);
  chat.querySelectorAll('.msg-row,.sys-note,.tip,.opts').forEach((el,i) => {
    el.style.opacity = '0'; el.style.transform = 'translateY(6px)';
    setTimeout(() => { el.style.transition = 'opacity .22s ease, transform .22s ease'; el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, i*60);
  });
}

function render(d) {
  let h = '';
  for (const m of d.msgs) {
    if (m.t === 'sys') {
      h += `<div class="sys-note">${m.s}</div>`;
    } else if (m.t === 'opts') {
      h += `<div class="opts">`;
      m.opts.forEach(o => { h += `<span class="opt ${o.cls}">${o.icon} ${o.label}</span>`; });
      h += `</div>`;
    } else if (m.t === 'thais') {
      h += `<div class="msg-row"><div class="msg-who">Thais</div><div class="bubble">${fmt(m.s)}</div></div>`;
    } else if (m.t === 'lead') {
      h += `<div class="msg-row"><div class="msg-who r">Lead (exemplo)</div><div class="bubble lead">${fmt(m.s)}</div><div class="clearfix"></div></div>`;
    }
  }
  if (d.tip) h += `<div class="tip">💡 ${d.tip}</div>`;
  return h;
}

function fmt(s) {
  return s.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/_(.*?)_/g,'<em style="opacity:.7">$1</em>');
}

sel(0);
